<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materi 4 - Pseudo Class and Element</title>
    <link rel="stylesheet" href="../css/4-pseudo-class-and-element.css" />
  </head>
  <body>
    <h1>MATERI 4 - PSEUDO CLASS AND ELEMENT</h1>

    <!-- 1. PSEUDO CLASS -->
    <div>
      <button>Klik saya</button>
      <input type="text" />
    </div>

    <!-- 2. PSEUDO ELEMENT -->
    <ol type="a">
      <li>Makan</li>
      <li>Makan</li>
      <li>Makan</li>
    </ol>
    <ul>
      <li>Makan</li>
      <li>Makan</li>
      <li>Makan</li>
    </ul>
  </body>
</html>
