<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materi 1 - Flexbox</title>
    <link rel="stylesheet" href="../css/1-flexbox.css" />
  </head>
  <body>
    <h1>MATERI 1 - FLEXBOX</h1>

    <div class="flex-container">
      <!-- FLEXBOX : FLEX ITEMS -->
      <div class="kotak merah" style="order: 1; flex-grow: 1"></div>
      <div
        class="kotak hijau"
        style="order: 2; flex-grow: 4; flex-basis: 250px"

      <div class="kotak biru" style="order: 3; flex-shrink: 4"></div>
    </div>
  </body>
