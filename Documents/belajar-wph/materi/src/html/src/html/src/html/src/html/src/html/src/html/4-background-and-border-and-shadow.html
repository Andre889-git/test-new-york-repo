<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materi 4 - Background, Border and Shadow</title>
    <link rel="stylesheet" href="../css/output.css" />
  </head>
  <body>
    <h1>MATERI 4 - BACKGROUND, BORDER AND SHADOW</h1>

    <!-- 1. BACKGROUD -->
    <h2>1. BACKGROUND</h2>
    <div class="bg-pink-400 text-white">halo</div>

    <!-- 2. BORDER -->
    <h2>2. BORDER</h2>
    <div
      class="border-t-2 border-b-4 border-red-500 bg-amber-300 rounded-full px-2"
    >
      hello
    </div>

    <!-- 3. SHADOW -->
    <h2>3. SHADOW</h2>
    <div class="shadow shadow-red-500">arigatou</div>

    <!-- 4. GRADIENT -->
    <h2>4. GRADIENT</h2>
    <div
      class="bg-linear-to-r from-red-500 to-yellow-500 text-white text-center"
    >
      priviet
    </div>
  </body>
</html>
