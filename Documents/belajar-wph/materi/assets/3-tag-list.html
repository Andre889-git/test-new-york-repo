<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materi 3 - Tag List</title>
  </head>
  <body>
    <h1>MATERI 3 - TAG LISTS</h1>

    <h2>1. Materi Tag Ordered List</h2>
    <!-- Ordered List (ol) : Membuat list dengan urutan -->
    <ol type="a">
      <li>Masako</li>
      <li>Bawang Goreng</li>
      <li>Merica</li>
      <li>Lengkuas</li>
      <li>Kunyit</li>
    </ol>

    <h2>2. Materi Tag Unordered List</h2>
    <!-- Unordered List (ul) : Membuat list tidak ada urutan -->
    <ul>
      <li>Laptop</li>
      <li>Mouse</li>
      <li>Keyboard</li>
    </ul>
  </body>
</html>
