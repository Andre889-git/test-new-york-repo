<html lang="en">

    <meta charset="UTF-8" />

    <title>Materi 2 - Tag Links dan Image</title>

  <body>
    <h1>MATERI 2 - TAG LINKS DAN IMAGE</h1>

    <h2>1. Materi Tag Hyperlink</h2>
    <!-- Hyperlink/links (a) : Menghubungkan website dengan halaman lain -->
    <!-- Online -->
    <a href="https://www.instagram.com/dkyfrnd_">Klik ke instagram saya</a>
    <a href="https://youtube.com">Buka youtube</a>
    <a
      href="https://www.w3schools.com/"
      target="_blank"
      rel="noopener noreferrer"
      >Buka w3school</a
    >
    <!-- Local -->
    <a href="./1-tag-text.html" target="_blank">Buka Materi Tag Text</a>

    <h2>2. Materi Tag Images</h2>
    <!-- Images (img) : Untuk memberikan media gambar pada halaman web -->
    <!-- Online -->
    <img
      src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFBBBtH-V88EZX9iLtdCfv0UxG5xENLKZ_Bg&s"
      alt="Gambar Einstein"
    />

    <!-- Local -->
    <img src="./assets/avenger.jpg" alt="Ini gambar avenger" />
  </body>
</html>
